services:
  # Backend API (Go)
  backend:
    build:
      context: ./ong-management-backend
      dockerfile: Dockerfile
    container_name: ong-gestor-pro-backend
    ports:
      - "8080:8080"
    environment:
      - DB_USER=${DB_USER:-ong_user}
      - DB_PASSWORD=${DB_PASSWORD:-rootpassword}
      - DB_HOST=ong-gestor-pro-db
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-ong_db}
      - JWT_SECRET=${JWT_SECRET:-ong_management_secret_key_2026}
    depends_on:
      ong-gestor-pro-db:
        condition: service_healthy
    networks:
      - ong-network
    restart: unless-stopped

  # Database (MySQL)
  ong-gestor-pro-db:
    image: mysql:8.0
    container_name: ong-gestor-pro-db
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-rootpassword}
      - MYSQL_DATABASE=${DB_NAME:-ong_db}
      - MYSQL_USER=${DB_USER:-ong_user}
      - MYSQL_PASSWORD=${DB_PASSWORD:-rootpassword}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # ESTA LINHA CORRIGE O ERRO 1130 AUTOMATICAMENTE:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ong-network
    restart: unless-stopped

  frontend:
    build:
      context: ./Ong-managment-front
      dockerfile: Dockerfile
    container_name: ong-gestor-pro-frontend
    ports:
      - "3001:80"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8080}
    depends_on:
      - backend
    networks:
      - ong-network
    restart: unless-stopped

networks:
  ong-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local